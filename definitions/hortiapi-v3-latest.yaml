        issuer:
          type: string
          format: uri
          description: Canonical issuer/base identity URL for this server.
          example: https://example-company.com
        apiBaseUrl:
          type: string
          format: uri
          description: Base URL where the API is served.
          example: https://example-company.com/horti-api/v3
        version:
          type: string
          description: Implementation build/service version (may include prerelease identifiers).
          example: 3.0.0-rc.199
        openapi:
          type: string
          format: uri
          description: URL to the OpenAPI document for this server.
          example: https://example-company.com/horti-api/v3/hortiapi-v3.yaml
        protocols:
          $ref: "#/components/schemas/HortiApiDiscoveryProtocols"
        capabilities:
