components:

  parameters:

    x-company-id:
      name: x-company-id
      in: header
      required: false
      description: The company ID to use when a user has access rights for multiple companies.
      schema:
        $ref: '#/components/schemas/Id'

    x-language:
      name: x-language
      in: header
      required: false
      description: |
        Preferred language code (e.g., `nl`, `en`, `de`, `fr`) to use when serializing `Texts` fields.
        If provided, the server will try to return content in the requested language.
        If not provided or if the requested language is unavailable, the server may fall back
        to a default language or return multiple language values depending on the chosen `x-language-mode`.
      schema:
        type: string
        example: en

    x-language-mode:
      name: x-language-mode
      in: header
      required: false
      description: |
        Controls how `Texts` fields are serialized in the response.
        Possible values are defined in the `LanguageMode` schema:
        - `default`: Let the server decide the most appropriate format.
        - `value`: Return only the text value as a plain string.
        - `text`: Return a single object containing both language code and value.
        - `texts`: Return an array of objects for multiple languages.
        Can be combined with `x-language` to fine-tune language selection and output format.
      schema:
        $ref: '#/components/schemas/LanguageMode'

    idempotency-key:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Unique key to ensure idempotent processing of POST requests.
        Repeated requests with the same key return the original response.
      schema:
        type: string
        maxLength: 255

    last-event-id:
      name: Last-Event-ID
      in: header
      required: false
      description: Resume SSE stream from last received event id
      schema:
        type: string

    prefer:
      name: Prefer
      in: header
      required: false
      description: |
        RFC 7240 Prefer. HortiApi supports:
        - max-results=<n> : limit number of returned items
      schema:
        type: string
      example: "max-results=200"

  headers:
    preference-applied:
      description: Indicates which Prefer directives were applied.
      schema:
        type: string
      example: "max-results"

  schemas:

    Address:
      required:
        - type
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        type:
          $ref: '#/components/schemas/AddressType'
        gln:
          type: string
        hub:
          type: string
          description: gln of the hub where the address is located or empty if there is none
        addressLines:
          type: array
          items:
            type: string
        postalCode:
          type: string
        place:
          type: string
        state:
          type: string
        countryCode:
          type: string
        countryName:
          type: string
        phone:
          type: string
        email:
          type: string
      additionalProperties: false

    AddressType:
      enum:
        - unknown
        - default
        - physical
        - postal
        - delivery
      type: string

    Amount:
      required:
        - value
      type: object
      properties:
        value:
          format: double
          type: number
          example: 1.75
        currency:
          type: string
          default: EUR
      additionalProperties: false

    Application:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        value:
          type: string
          default: ''
          example: 'Application XYZ'
      additionalProperties: false

    Article:
      type: object
      nullable: true
      properties:
        id:
          $ref: '#/components/schemas/Id'
        list:
          $ref: '#/components/schemas/ArticleList'
        code:
          type: string
          description: ID of the article assigned by the industry such as 'VBN code'
          nullable: true
          example: '27157'
        group:
          $ref: '#/components/schemas/ArticleGroup'
        groupCode:
          type: string
          description: ID of the article group assigned by the industry system such as 'VBN group'
          nullable: true
          example: '10100101'
        name:
          $ref: '#/components/schemas/Texts'
          # example: 'Rosa grootbloemig Red Naomi!'
        tradeName:
          type: string
          example: 'R GR RED NAOMI!'
        genus:
          type: string
          nullable: true
          example: 'Rosa'
        species:
          type: string
          nullable: true
        cultivar:
          type: string
          nullable: true
        features:
          type: array
          items:
            $ref: '#/components/schemas/ItemFeature'
        regulatoryFeatures:
          type: array
          items:
            $ref: '#/components/schemas/ArticleRegulatoryFeature'
        resources:
          $ref: '#/components/schemas/Resources'
      additionalProperties: false

    ArticleSseEvent:
      type: object
      required: 
        - event
        - data
      properties:
        event:
          $ref: '#/components/schemas/StreamEventType'
        id:
          type: string
          description: SSE event id
        retry:
          type: integer
          minimum: 0
          description: Reconnect delay in ms
        data:
          type: string
          contentMediaType: application/json
          contentSchema:
            $ref: '#/components/schemas/Article'
      additionalProperties: false

    ArticleFeaturePrescription:
      enum:
        - empty
        - required
        - recommended
        - allowed
      type: string
      example: 'required'
      default: 'empty'

    ArticleFilter:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        list:
          $ref: '#/components/schemas/ArticleList'
        code:
          type: string
          default: ''
          example: '27157'
        name:
          type: string
          default: ''
          example: 'Red Naomi'
        tradeName:
          type: string
          default: ''
          example: 'RED NAOMI'
        group:
          $ref: '#/components/schemas/ArticleGroup'
        groupCode:
          type: string
          default: ''
          example: '10100101'
        resources:
          $ref: '#/components/schemas/Resources'
      additionalProperties: false

    ArticleGroup:
      enum:
        - none

        # core
        - cut-flowers
        - house-plants
        - garden-plants

        # bouquets/arrangements
        - bouquets
        - house-plant-arrangements
        - garden-plant-arrangements

        # other
        - cut-foliage
        - decorative-materials
        - bulbs
        - packaging-materials

        # artificial
        - artificial-flowers
        - artificial-plants

      type: string
      example: 'cut-flowers'
      default: 'none'

    ArticleList:
      enum:
        - vbn
        - plu
        - cn
