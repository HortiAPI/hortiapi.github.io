openapi: '3.1.0'

info:

  title: HortiApi

  version: 3.0.0-rc.53

  description: |-
    Definition of the HortiApi, OpenAPI 3.1-compliant YAML document describing horticultural API endpoints.
    Visit [https://hortiapi.com](https://hortiapi.com) for details.

    Note: Server-Sent Events (SSE) endpoints are described using OpenAPI 3.2 semantics.
    This does not affect runtime behavior, but some viewers may not fully reflect SSE details.

    Some useful links:
    - [hortiapi.com](https://hortiapi.com)
    - [github.com/hortiapi](https://github.com/hortiapi)
    - [rapidocweb.com](https://rapidocweb.com)
    - [swagger.io](https://swagger.io)
  
  termsOfService: https://hortiapi.com/terms-of-service
  
  contact:
    name: Michael Lakerveld
    email: apiteam@hortiapi.com
    url: https://hortiapi.com/

  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

externalDocs:
  description: Find out more about HortiApi
  url: https://hortiapi.com

servers:
  - url: http://localhost/horti-api/v3
  - url: https://v3.sandbox.hortiapi.net
  - url: https://v3.hortiapi.net
  - url: https://api.ai2.nl/v3

tags:
  - name: Article
    description: |
      Definitions of products including classification, names
      and other relevant properties.

  - name: Catalog
    description: |
      Create, modify and search for catalog items which can be used as the 
      template for stock or orderlines.

  - name: Company
    description: |
      Lookup and search for companies active in the horticulture sector,
      including their identifiers and types.

  - name: Data
    description: |
      Lookup generic structured reference data such as countries, currencies, 
      and units used throughout the API.

  - name: Discovery
    description: |
      Provides a machine-readable capability and protocol description of this HortiAPI server.
      This endpoint enables dynamic client configuration and multi-vendor interoperability
      by exposing which API modules and protocols are supported by this implementation.

  - name: Document
    description: |
      Create and manage documents such as invoices and delivery notes linked
      to entities in the system.

  - name: Facility
    description: |
      Lookup and manage facilities operated by a company, such as warehouses,
      production sites or distribution centers, used in logistics and stock flows.

  - name: Feature
    description: |
      Characteristics that define article variations, such as stem length,
      number of buds, or flower color.

  - name: Goods
    description: |
      Physical goods within facilities, representing concrete instances of
      articles as they are stored, handled or moved through logistics processes.

  - name: Me
    description: |
      Details about the authenticated user, including linked companies
      and applications with granted access.

  - name: Order
    description: |
      Create, modify and search for orders between customers and suppliers that
      describe delivery and payment conditions.

  - name: OrderLine
    description: |
      Create, modify and search for orderlines that describe specific articles,
      quantities, pricing and other options.

  - name: Stock
    description: |
      Create, modify and search for stock availability already in storage or 
      in transit and check product specifications.

  - name: Supply
    description: |
      Real-time availability of products offered by growers or suppliers,
      used to place, update or cancel orders and track state changes.

  - name: User
    description: |
      Lookup and search for users active in the horticulture sector,
      including their identifiers and companies.

paths:

# article

  /article:

    post:
      tags:
        - Article
      operationId: HAPI3ArticleUpdate
      summary: Create or update article
      description: |-
        Create a new article when no `id` is supplied; update existing when `id` is present.
      parameters:
        - $ref: '#/components/parameters/idempotency-key'
        - $ref: '#/components/parameters/x-company-id'
        - $ref: '#/components/parameters/x-language'
        - $ref: '#/components/parameters/x-language-mode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Article'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /article/{articleId}:

    get:
      tags:
        - Article
      operationId: HAPI3ArticleGet
      summary: Get article by ID
      description: |-
        Retrieve the details of the article with the specified `articleId`. If not found, a 404 error will be returned.
      parameters:
        - $ref: '#/components/parameters/x-company-id'
        - $ref: '#/components/parameters/x-language'
        - $ref: '#/components/parameters/x-language-mode'
        - in: path
          name: articleId
          required: true
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '501':
          $ref: '#/components/responses/NotImplemented'

    delete:
      tags:
        - Article
      operationId: HAPI3ArticleDelete
      summary: Delete article by ID
      description: |-
        Remove the article identified by `articleId` from the system.
      parameters:
        - $ref: '#/components/parameters/x-company-id'
        - $ref: '#/components/parameters/x-language'
        - $ref: '#/components/parameters/x-language-mode'
        - in: path
          name: articleId
          required: true
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /article/search:

    post:
      tags:
        - Article
      operationId: HAPI3ArticleSearch
      summary: Search article items
      description: |-
        Find articles matching given criteria (e.g. name, group, code).
      parameters:
        - $ref: '#/components/parameters/last-event-id'
        - $ref: '#/components/parameters/prefer'
        - $ref: '#/components/parameters/x-company-id'
        - $ref: '#/components/parameters/x-language'
        - $ref: '#/components/parameters/x-language-mode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleFilter'
      responses:
        '200':
          description: OK
          headers:
            Preference-Applied:
              $ref: '#/components/headers/preference-applied'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
            text/event-stream:
              description: Server-Sent Events stream with article updates
              itemSchema:
                $ref: '#/components/schemas/ArticleSseEvent'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '410':
          $ref: '#/components/responses/GoneError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '501':
          $ref: '#/components/responses/NotImplemented'


