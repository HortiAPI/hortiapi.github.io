    LanguageMode:
      description: |
        Defines how multilingual text values are serialized in JSON.
        Possible values:
        - `default`: Let the server choose the most appropriate format.
        - `value`: Serialize as a plain string.
        - `text`: Serialize as a single object with language code and value.
        - `texts`: Serialize as an array of objects for multiple languages.
      enum:
        - default
        - value
        - text
        - texts
      type: string
      default: 'default'
      example: 'value'
      x-enum-descriptions:
        - Let the server choose the most appropriate format.
        - Serialize as a plain string (single language, no metadata).
        - Serialize as a single object with language code and value.
        - Serialize as an array of objects for multiple languages.

